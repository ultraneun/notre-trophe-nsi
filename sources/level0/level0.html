<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 0 - The Backrooms</title>
    <link rel="stylesheet" href="/level0/style0.css">
</head>
<body>
    <!-- Page d'accueil -->
    <div class="container" id="accueil">
        <h1 class="bug">LEVEL 0</h1>
        <div class="message">
            <p>Vous n'auriez pas dû être ici.</p>
            <p>Personne ne choisit d'entrer. <span class="alert">Vous avez glissé.</span></p>
            <p>Les murs sont humides. Le bourdonnement ne s'arrête jamais. L'odeur de moquette mouillée vous suit partout.</p>
            <p>Vous marchez depuis combien de temps déjà ?</p>
            <p><em>Quelque chose marche aussi.</em></p>
        </div>
        <button class="bouton" id="btn-yeux">Ne pas fermer les yeux</button>
    </div>

    <!-- Overlay vidéo -->
    <div id="video-overlay">
        <div class="tv">
            <div class="tv-screen">
                <video id="intro-video" src="/level0/Backroom_intro.mp4"></video>
            </div>
        </div>
    </div>

    <audio id="murmure" loop>
        <source src="/sons/murmure.mp3" type="audio/mpeg">
    </audio>

    <script>
        const murmure = document.getElementById('murmure');
        murmure.volume = 0.02;

        const params = new URLSearchParams(window.location.search);
        if (params.get('audio') === '1') {
            murmure.play().catch(() => {});
        }

        document.addEventListener('click', function unlockAudio() {
            murmure.play().catch(() => {});
            document.removeEventListener('click', unlockAudio);
        });

        // Bouton "Ne pas fermer les yeux" -> Lance la vidéo
        document.getElementById('btn-yeux').addEventListener('click', function () {
            murmure.pause();
            murmure.currentTime = 0;

            // Cache l'accueil et montre la vidéo
            document.getElementById('accueil').style.display = 'none';
            const overlay = document.getElementById('video-overlay');
            const video = document.getElementById('intro-video');
            
            overlay.classList.add('active');
            video.play();

            // Quand la vidéo se termine -> va à l'énigme
            video.addEventListener('ended', () => {
                window.location.href = '/level0/level0.1.html';  
            });
        });
    </script>
</body>
</html>
