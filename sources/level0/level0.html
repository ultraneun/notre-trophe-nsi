<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 0 - The Backrooms</title>
    <link rel="stylesheet" href="/level0/style0.css">
</head>
<body>
 
    <div class="container" id="accueil">
        <div class="terminal">
            <div class="terminal-header">NIVEAU_00 // BACKROOMS</div>
            <div class="terminal-body">
                <span id="terminal-text"></span><span class="cursor">█</span>
                <div id="skip-hint">[ ESPACE ]</div> 
            </div>
            <div class="terminal-footer" id="terminal-footer">
                <button class="bouton" id="btn-yeux">Ne pas fermer les yeux</button>
            </div>
        </div>
    </div>
 
    <!-- Overlay vidéo -->
    <div id="video-overlay">
        <div class="tv">
            <div class="tv-screen">
                <video id="intro-video" src="/level0/Backroom_intro.mp4"></video>
            </div>
        </div>
    </div>
 
    <script>
        const sfxLettre = new Audio('/sons/son_lettre.mp3');
        sfxLettre.volume = 0.3; // On baisse un peu le volume pour que ce ne soit pas agressif
        const lignes = [
            "Vous n'auriez pas dû être ici.",
            "Personne ne choisit d'entrer. Vous avez glissé.",
            "Les murs sont humides. Le bourdonnement ne s'arrête jamais.",
            "L'odeur de moquette mouillée vous suit partout.",
            "Vous marchez depuis combien de temps déjà ?",
            "Quelque chose marche aussi.",
        ];

        let skipAnimation = false;
 
        const el = document.getElementById('terminal-text');
        const footer = document.getElementById('terminal-footer');
        let ligneIndex = 0;
        let charIndex = 0;
        let texteComplet = '';
 
        function typeChar() {
            if (ligneIndex >= lignes.length) {
                document.getElementById('skip-hint').style.opacity = "0";
                setTimeout(() => footer.classList.add('visible'), 600);
                return;
            }

            const ligne = lignes[ligneIndex];

            if (skipAnimation) {
                texteComplet += ligne.substring(charIndex) + '\n';
                el.textContent = texteComplet;
                ligneIndex++;
                charIndex = 0;
                skipAnimation = false;
                setTimeout(typeChar, 420);
                return;
    }

            if (charIndex < ligne.length) {
                texteComplet += ligne[charIndex];
                el.textContent = texteComplet;
        
                // Son
                if (ligne[charIndex] !== ' ') {
                    const clone = sfxLettre.cloneNode();
                    clone.volume = 0.2;
                    clone.play().catch(() => {});
                }
                //

                charIndex++;
                const delay = ligne[charIndex - 1] === '.' ? 1000 : 60;
                setTimeout(typeChar, delay);
            } else {
                texteComplet += '\n';
                el.textContent = texteComplet;
                ligneIndex++;
                charIndex = 0;
                setTimeout(typeChar, 420);
            }
        }

        setTimeout(() => {
            if (ligneIndex < lignes.length) {
                const hint = document.getElementById('skip-hint');
                if(hint) hint.style.opacity = "1";
            }
        }, 4000);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && ligneIndex < lignes.length) {
            e.preventDefault(); 
            skipAnimation = true;
        }
    });
        // Démarrer après un court délai
        setTimeout(typeChar, 800);
 
        // Bouton
        document.getElementById('btn-yeux').addEventListener('click', function () {
            document.getElementById('accueil').style.display = 'none';
            const overlay = document.getElementById('video-overlay');
            const video = document.getElementById('intro-video');
            overlay.classList.add('active');
            video.play();
            video.addEventListener('ended', () => {
                window.location.href = '/level0/level0.1.html';
            });
        });
    </script>
    <div id="skip-hint">[ ESPACE ]</div> </body>
</body>
</html>
