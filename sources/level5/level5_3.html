<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 5.3 - Final</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }
        #video-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #video-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="video-overlay">
        <video id="transition-video" src="/level5/final.mp4" muted playsinline preload="auto"></video>
    </div>
    <script>
        const videoOverlay = document.getElementById('video-overlay');
        const video = document.getElementById('transition-video');

        function lancerVideo() {
            videoOverlay.classList.add('active');
            video.muted = true;
            video.play().then(() => {
                // Essayer fullscreen après le démarrage
                if (video.requestFullscreen) {
                    video.requestFullscreen().catch(() => {});
                }
            }).catch(err => {
                console.log('Erreur lecture:', err);
                // Fallback : essayer sans fullscreen
                video.play().catch(() => {});
            });
        }

        video.addEventListener('ended', () => {
            window.location.href = '/level5.4';
        });

        video.addEventListener('error', () => {
            console.log('Erreur vidéo');
            setTimeout(() => { window.location.href = '/level5.4'; }, 2000);
        });

        // Démarrer automatiquement au chargement
        window.addEventListener('load', () => {
            lancerVideo();
        });

        // Fallback : clic pour démarrer si autoplay bloqué
        document.addEventListener('click', () => {
            if (video.paused) {
                lancerVideo();
            }
        }, { once: true });
    </script>
</body>
</html>
