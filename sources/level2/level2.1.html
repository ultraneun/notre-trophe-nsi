<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 - Protocole</title>
    <link rel="stylesheet" href="/level2/style2.css">
    <style>
        #panneau-code {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #panneau-code.visible { display: flex; opacity: 1; }
        #panneau-code-label {
            font-size: 0.5rem;
            letter-spacing: 0.4rem;
            color: #0a3040;
            text-transform: uppercase;
        }
        #code-input {
            background: rgba(0, 4, 8, 0.9);
            border: 1px solid #0a3a50;
            color: #00d4f0;
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            letter-spacing: 0.5rem;
            padding: 0.6rem 1.8rem;
            width: 240px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        #code-input:focus { border-color: #00d4f0; }
        #code-input::placeholder { color: #0a3040; letter-spacing: 0.4rem; }
        #btn-valider-code {
            background: transparent;
            color: #00d4f0;
            border: 1px solid #0a5a70;
            padding: 0.5rem 2rem;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            transition: all 0.3s;
        }
        #btn-valider-code:hover { background: rgba(0,180,220,0.08); border-color: #00d4f0; }
        #code-message {
            font-size: 0.65rem;
            letter-spacing: 0.15rem;
            font-family: 'Courier New', monospace;
            min-height: 1rem;
        }
        @keyframes shake-wrong {
            0%,100% { transform: translateX(-50%) translateX(0); }
            20% { transform: translateX(-50%) translateX(-10px); }
            40% { transform: translateX(-50%) translateX(10px); }
            60% { transform: translateX(-50%) translateX(-6px); }
            80% { transform: translateX(-50%) translateX(6px); }
        }
    </style>
</head>
<body>

<div id="scene"><img id="scene-img" src="/images/level2.jpg" alt=""></div>
<canvas id="drip-canvas"></canvas>
<div id="water-level"></div>
<div id="room-indicator">— bassin principal —</div>

<div class="zone-group" id="zones-principal">
    <div class="zone" id="z-col-gauche"
         style="left:0%; top:26%; width:4%; height:15%;"
         data-action="popup" data-target="sol-principal"></div>
    <div class="zone" id="z-porte-tob"
         style="left:45%; top:42%; width:8%; height:15%;"
         data-action="redirect" data-target="/level2.2"></div>
    <div class="zone" id="z-porte-tuyau"
         style="left:69%; top:43%; width:9%; height:15%;"
         data-action="redirect" data-target="/level2.3"></div>
    <div class="zone" id="z-panneau"
         style="left:83%; top:28%; width:9%; height:11%;"
         data-action="panneau"></div>
</div>

<!-- PANNEAU CODE -->
<div id="panneau-code">
    <div id="panneau-code-label">protocole d'évacuation — code d'accès</div>
    <input type="text" id="code-input" placeholder="· · · · · · · ·" maxlength="9" autocomplete="off">
    <button id="btn-valider-code">Valider</button>
    <div id="code-message"></div>
</div>

<!-- POPUP -->
<div id="popup">
    <div class="popup-inner">
        <div class="popup-title" id="popup-title">—</div>
        <div id="popup-content"></div>
        <button class="popup-close" id="popup-close">Continuer</button>
    </div>
</div>

<!-- JUMPSCARE -->
<div id="jumpscare">
    <img id="jumpscare-img" src="/images/monstre2.png" alt="">
    <div id="jumpscare-text"></div>
</div>

<!-- AUDIO -->
<audio id="amb"       loop src="/sons/water-drip-ambiance.mp3"></audio>
<audio id="sfx-found"      src="/sons/found.mp3"></audio>
<audio id="sfx-error"      src="/sons/nsasr-jumpscare-sound-effect.mp3"></audio>

<script>
const state = { bloque: false };

const amb = document.getElementById('amb');
amb.volume = 0.04;
document.addEventListener('click', () => amb.play().catch(()=>{}), { once: true });

function playSfx(id) {
    const el = document.getElementById(id);
    if (el) { el.currentTime = 0; el.volume = 0.9; el.play().catch(()=>{}); }
}

const popupData = {
    'sol-principal': {
        title: 'Le sol du bassin',
        content: `
            <p class="popup-text">L'eau monte. Pas vite. Mais elle monte.</p>
            <p class="popup-text italic">Un panneau d'urgence est fixé au mur. Il attend un code.</p>
            <p class="popup-text">Les deux salles ont peut-être révélé quelque chose.</p>
            <p class="popup-text faded">— Combinez ce que vous avez trouvé.</p>
        `
    }
};

function bindZone(zone) {
    zone.addEventListener('click', () => {
        if (state.bloque) return;
        const action = zone.dataset.action;
        const target = zone.dataset.target;
        if (action === 'redirect') {
            window.location.href = target;
        } else if (action === 'panneau') {
            ouvrirPanneau();
        } else if (action === 'popup') {
            const data = popupData[target];
            if (!data) return;
            playSfx('sfx-found');
            showPopup(data.title, data.content);
        }
    });
}
document.querySelectorAll('.zone').forEach(bindZone);

function ouvrirPanneau() {
    const p = document.getElementById('panneau-code');
    p.style.display = 'flex';
    // petit délai pour que la transition CSS fonctionne
    requestAnimationFrame(() => requestAnimationFrame(() => p.classList.add('visible')));
    setTimeout(() => document.getElementById('code-input').focus(), 100);
}

document.getElementById('btn-valider-code').addEventListener('click', validerCode);
document.getElementById('code-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') validerCode();
});

async function validerCode() {
    if (state.bloque) return;
    const val = document.getElementById('code-input').value.trim();
    const msg = document.getElementById('code-message');
    if (!val) return;

    try {
        const rep = await fetch('/verifier/6', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ flag: val })
        });
        const data = await rep.json();
        if (data.succes) {
            msg.style.color = '#00ff88';
            msg.textContent = 'Accès autorisé.';
            setTimeout(() => lancerTransition(), 1200);
        } else {
            document.getElementById('code-input').value = '';
            msg.textContent = '';
            state.bloque = true;
            const p = document.getElementById('panneau-code');
            p.style.animation = 'shake-wrong 0.4s';
            setTimeout(() => { p.style.animation = ''; }, 400);
            declencherJumpscare("Code invalide. Le système s'est réinitialisé.");
        }
    } catch {
        msg.style.color = '#cc5555';
        msg.textContent = 'Erreur réseau.';
    }
}

let pendingApres = null;
function showPopup(title, content, apres) {
    document.getElementById('popup-title').textContent = title;
    document.getElementById('popup-content').innerHTML = content;
    document.getElementById('popup').classList.add('active');
    pendingApres = apres || null;
}
document.getElementById('popup-close').addEventListener('click', () => {
    document.getElementById('popup').classList.remove('active');
    if (pendingApres) { pendingApres(); pendingApres = null; }
});

function declencherJumpscare(message) {
    amb.pause();
    const js = document.getElementById('jumpscare');
    const jsText = document.getElementById('jumpscare-text');
    playSfx('sfx-error');
    js.classList.add('active');
    setTimeout(() => { jsText.innerHTML = 'IL VOUS A VU.'; jsText.classList.add('visible'); }, 380);
    setTimeout(() => { jsText.innerHTML = `IL VOUS A VU.<br><span class="js-reason">${message}</span>`; }, 1050);
    setTimeout(() => {
        js.classList.remove('active');
        jsText.classList.remove('visible');
        jsText.innerHTML = '';
        state.bloque = false;
        amb.play().catch(()=>{});
    }, 3500);
}

function lancerTransition() {
    amb.pause();
    const fade = document.createElement('div');
    fade.style.cssText = 'position:fixed;inset:0;background:#000;opacity:0;z-index:9999;transition:opacity 1.2s ease;pointer-events:none;';
    document.body.appendChild(fade);
    requestAnimationFrame(() => {
        fade.style.opacity = '1';
        setTimeout(() => { window.location.href = '/level3'; }, 1400);
    });
}

(function() {
    const canvas = document.getElementById('drip-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const drips = [];
    function createDrip() {
        drips.push({ x: Math.random()*canvas.width, y:-10,
            radius: Math.random()*1.8+0.8, speed: Math.random()*1.4+0.4,
            opacity: Math.random()*0.25+0.04, trail:[] });
    }
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if (Math.random()<0.012) createDrip();
        for (let i=drips.length-1;i>=0;i--) {
            const d=drips[i];
            d.trail.push({x:d.x,y:d.y});
            if(d.trail.length>20) d.trail.shift();
            d.y+=d.speed;
            d.trail.forEach((pt,idx)=>{
                ctx.beginPath();
                ctx.arc(pt.x,pt.y,d.radius*0.45,0,Math.PI*2);
                ctx.fillStyle=`rgba(0,180,210,${(idx/d.trail.length)*d.opacity*0.45})`;
                ctx.fill();
            });
            ctx.beginPath();
            ctx.arc(d.x,d.y,d.radius,0,Math.PI*2);
            ctx.fillStyle=`rgba(0,200,230,${d.opacity})`;
            ctx.fill();
            if(d.y>canvas.height+20) drips.splice(i,1);
        }
        requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
})();
</script>
    <audio id="musique" loop>
        <source src="/sons/level2_eau.mp3" type="audio/mpeg">
    </audio>

    <script>
    const musique = document.getElementById('musique');
    musique.currentTime = 2;
    musique.volume = 0;
    musique.play().catch(()=>{});

    let vol = 0;
    const fadeIn = setInterval(() => {
        vol = Math.min(0.2, vol + 0.01);
        musique.volume = vol;
        if (vol >= 0.2) clearInterval(fadeIn);
    }, 50);
    </script>
</body>
</html>
