    if (state.bloque) return;
    const val = document.getElementById('code-input').value.trim();
    const msg = document.getElementById('code-message');
    if (!val) return;

    try {
        const rep = await fetch('/verifier/6', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ flag: val })
        });
        const data = await rep.json();
        if (data.succes) {
            msg.style.color = '#00ff88';
            msg.textContent = 'Accès autorisé.';
            setTimeout(() => lancerTransition(), 1200);
        } else {
            document.getElementById('code-input').value = '';
            msg.textContent = '';
            state.bloque = true;
            const p = document.getElementById('panneau-code');
            p.style.animation = 'shake-wrong 0.4s';
            setTimeout(() => { p.style.animation = ''; }, 400);

    } catch {
        msg.style.color = '#cc5555';
        msg.textContent = 'Erreur réseau.';
    }
}

        state.bloque = false;
        amb.play().catch(()=>{});
    }, 3500);
}

function lancerTransition() {
    amb.pause();
    const fade = document.createElement('div');
    fade.style.cssText = 'position:fixed;inset:0;background:#000;opacity:0;z-index:9999;transition:opacity 1.2s ease;pointer-events:none;';
    document.body.appendChild(fade);
    requestAnimationFrame(() => {
        fade.style.opacity = '1';
        setTimeout(() => { window.location.href = '/level3'; }, 1400);
    });
}

(function() {
    const canvas = document.getElementById('drip-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const drips = [];
    function createDrip() {
        drips.push({ x: Math.random()*canvas.width, y:-10,
            radius: Math.random()*1.8+0.8, speed: Math.random()*1.4+0.4,
            opacity: Math.random()*0.25+0.04, trail:[] });
    }
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if (Math.random()<0.012) createDrip();
        for (let i=drips.length-1;i>=0;i--) {
            const d=drips[i];
            d.trail.push({x:d.x,y:d.y});
            if(d.trail.length>20) d.trail.shift();
            d.y+=d.speed;
            d.trail.forEach((pt,idx)=>{
                ctx.beginPath();
                ctx.arc(pt.x,pt.y,d.radius*0.45,0,Math.PI*2);
                ctx.fillStyle=`rgba(0,180,210,${(idx/d.trail.length)*d.opacity*0.45})`;
                ctx.fill();
            });
            ctx.beginPath();
            ctx.arc(d.x,d.y,d.radius,0,Math.PI*2);
            ctx.fillStyle=`rgba(0,200,230,${d.opacity})`;
            ctx.fill();
            if(d.y>canvas.height+20) drips.splice(i,1);
        }
        requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
})();
</script>

        vol = Math.min(0.2, vol + 0.01);
        musique.volume = vol;
        if (vol >= 0.2) clearInterval(fadeIn);
