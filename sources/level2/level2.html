<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 - The Backrooms</title>
    <link rel="stylesheet" href="/level2/style2.css">
</head>
<body class="intro">

    <div class="container" id="accueil">
        <div class="terminal">
            <div class="terminal-header">NIVEAU_02 // BACKROOMS — ZONE AQUATIQUE</div>
            <div class="terminal-body">
                <span id="terminal-text"></span><span class="cursor">█</span>
            </div>
            <div class="terminal-footer" id="terminal-footer">
                <button class="bouton" id="btn-entrer">Descendre dans l'eau</button>
            </div>
        </div>
    </div>

    <script>
        const sfxLettre = new Audio('/sons/son_lettre.mp3');
        sfxLettre.volume = 0.3;
        
        const lignes = [
            "Les tuyaux gouttent constamment.",
            "L'eau monte. Lentement. Sans s'arrêter.",
            "Les salles des machines émettent des bruits étranges",
            "Certaines portes mènent à des piscines abandonnées.",
            "L'eau n'est pas potable.",
            "Quelque chose vit ici. Sous la surface.",
        ];

        const el = document.getElementById('terminal-text');
        const footer = document.getElementById('terminal-footer');
        let ligneIndex = 0;
        let charIndex = 0;
        let texteComplet = '';

        function typeChar() {


            if (ligneIndex >= lignes.length) {
                setTimeout(() => footer.classList.add('visible'), 600);
                return;
            }
            const ligne = lignes[ligneIndex];
            if (charIndex < ligne.length) {
                texteComplet += ligne[charIndex];
                el.textContent = texteComplet;
                if (ligne[charIndex] !== ' ') {
                    const clone = sfxLettre.cloneNode();
                    clone.volume = 0.2;
                    clone.play().catch(() => {});
                }
                charIndex++;
                const char = ligne[charIndex - 1];
                const lastThree = ligne.slice(charIndex - 3, charIndex);
                const delay =
                    lastThree === '...' ? 1000 :
                    (char === '.' || char === '?') ? 500 : 50;
                setTimeout(typeChar, delay);
            } else {
                texteComplet += '\n'; el.textContent = texteComplet;
                ligneIndex++; charIndex = 0;
                setTimeout(typeChar, 500);
            }
        }

        setTimeout(typeChar, 800);

        document.getElementById('btn-entrer').addEventListener('click', function () {
            window.location.href = '/level2.1';
        });
    </script>
</body>
</html>
