<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 - The Backrooms</title>
    <link rel="stylesheet" href="/level2/style2.css">
</head>
<body class="intro">

    <div class="container" id="accueil">
        <div class="terminal">
            <div class="terminal-header">NIVEAU_02 // BACKROOMS — ZONE AQUATIQUE</div>
            <div class="terminal-body">
                <span id="terminal-text"></span><span class="cursor">█</span>
            </div>
            <div class="terminal-skip" id="terminal-skip">[ espace ]</div>
            <div class="terminal-footer" id="terminal-footer">
                <button class="bouton" id="btn-entrer">Descendre dans l'eau</button>
            </div>
        </div>
    </div>

    <script>
        const sfxLettre = new Audio('/sons/son_lettre.mp3');
        sfxLettre.volume = 0.3;
        
        const lignes = [
            "Les tuyaux gouttent constamment.",
            "L'eau monte. Lentement. Sans s'arrêter.",
            "Les salles des machines émettent des bruits étranges",
            "Certaines portes mènent à des piscines abandonnées.",
            "L'eau n'est pas potable.",
            "Quelque chose vit ici. Sous la surface.",
        ];

        const el = document.getElementById('terminal-text');
        const footer = document.getElementById('terminal-footer');
        const skip = document.getElementById('terminal-skip');
        let ligneIndex = 0, charIndex = 0, texteComplet = '';
        let typewriterFini = false, timeoutId = null;

        function finirTypewriter() {
            if (typewriterFini) return;
            typewriterFini = true;
            if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
            el.textContent = lignes.join('\n');
            skip.style.opacity = '0';
            setTimeout(() => footer.classList.add('visible'), 600);
        }

        function typeChar() {
            if (typewriterFini) return;
            if (ligneIndex >= lignes.length) {
                typewriterFini = true;
                skip.style.opacity = '0';
                setTimeout(() => footer.classList.add('visible'), 600);
                return;
            }
            const ligne = lignes[ligneIndex];
            if (charIndex < ligne.length) {
                texteComplet += ligne[charIndex];
                el.textContent = texteComplet;
                if (ligne[charIndex] !== ' ') {
                    const clone = sfxLettre.cloneNode();
                    clone.volume = 0.2;
                    clone.play().catch(() => {});
                }
                charIndex++;
                const char = ligne[charIndex - 1];
                const lastThree = ligne.slice(charIndex - 3, charIndex);
                const delay = lastThree === '...' ? 1000 : (char === '.' || char === '?') ? 500 : 50;
                timeoutId = setTimeout(typeChar, delay);
            } else {
                texteComplet += '\n'; el.textContent = texteComplet;
                ligneIndex++; charIndex = 0;
                timeoutId = setTimeout(typeChar, 500);
            }
        }

        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && !typewriterFini) {
                e.preventDefault();
                finirTypewriter();
            }
        });

        setTimeout(() => {
            skip.style.opacity = '1';
            typeChar();
        }, 800);

        document.getElementById('btn-entrer').addEventListener('click', function () {
            window.location.href = '/level2.1';
        });
    </script>
    <audio id="musique" loop>
        <source src="/sons/level2_eau.mp3" type="audio/mpeg">
    </audio>

    <script>
    const musique = document.getElementById('musique');
    musique.currentTime = 2;
    musique.volume = 0;
    musique.play().catch(()=>{});

    let vol = 0;
    const fadeIn = setInterval(() => {
        vol = Math.min(0.2, vol + 0.01);
        musique.volume = vol;
        if (vol >= 0.2) clearInterval(fadeIn);
    }, 50);
    </script>
</body>
</html>
