<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 3 - Séquence</title>
    <link rel="stylesheet" href="/level3/style3.css">
    <style>
        #message-jeu {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            letter-spacing: 0.15rem;
            font-family: 'Courier New', monospace;
            background: rgba(20, 5, 5, 0.92);
            border: 1px solid #4a1a1a;
            padding: 0.6rem 1.4rem;
            min-height: 2.2rem;
            text-align: center;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #message-jeu.visible { opacity: 1; }

        #intro-jeu { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        #intro-jeu.cache { display: none; }
        #jeu-principal { display: none; width: 100%; align-items: center; flex-direction: column; gap: 1.5rem; }
        #jeu-principal.visible { display: flex; }
    </style>
</head>
<body class="level3_3">

    <div class="container">
        <h1 class="bug">REPRODUIS</h1>

        <!-- Intro -->
        <div id="intro-jeu">
            <div class="message" style="max-width:400px; margin-bottom:0;">
                <p>2 vies, 3 manches, 5 flèches.</p>
                <p>Mémorise et reproduis.</p>
                <p>Clique sur les flèches.</p>
                <p>Le clavier est autorisé.</p>
            </div>
            <button class="bouton" onclick="demarrer()">Commencer</button>
        </div>

        <!-- Jeu -->
        <div id="jeu-principal">
            <div class="infos">
                <span>❤️ <span id="tentatives">2</span></span>
                <span>MANCHE <span id="manche">1</span>/3</span>
            </div>
            <div id="sequence-affichee" class="sequence-affichee"></div>
            <div class="fleches">
                <div class="ligne-fleches">
                    <button class="fleche" onclick="jouer('⬆️')">⬆️</button>
                </div>
                <div class="ligne-fleches">
                    <button class="fleche" onclick="jouer('⬅️')">⬅️</button>
                    <button class="fleche" onclick="jouer('⬇️')">⬇️</button>
                    <button class="fleche" onclick="jouer('➡️')">➡️</button>
                </div>
            </div>
        </div>

        <div id="message-jeu"></div>
    </div>

    <script>
        const FLECHES = ['⬆️', '⬅️', '⬇️', '➡️'];
        let tentatives = 2, manche = 1;
        let sequence = [], saisie = [];
        let affichageEnCours = true, bloque = false;

        function afficherMessage(texte, couleur) {
            const m = document.getElementById('message-jeu');
            m.textContent = texte;
            m.style.color = couleur;
            m.classList.add('visible');
        }
        function cacherMessage() {
            document.getElementById('message-jeu').classList.remove('visible');
        }

        function demarrer() {
            document.getElementById('intro-jeu').classList.add('cache');
            document.getElementById('jeu-principal').classList.add('visible');
            genererSequence();
            afficherSequence();
        }

        function genererSequence() {
            sequence = [];
            for (let i = 0; i < 5; i++) {
                sequence.push(FLECHES[Math.floor(Math.random() * FLECHES.length)]);
            }
        }

        function afficherSequence() {
            affichageEnCours = true;
            saisie = [];
            const el = document.getElementById('sequence-affichee');
            el.textContent = '';
            let i = 0;
            const interval = setInterval(() => {
                el.textContent += sequence[i] + ' ';
                i++;
                if (i >= sequence.length) {
                    clearInterval(interval);
                    setTimeout(() => { el.textContent = '? ? ? ? ?'; affichageEnCours = false; }, 1000);
                }
            }, 700);
        }

        function jouer(fleche) {
            if (affichageEnCours || bloque) return;
            saisie.push(fleche);
            document.getElementById('sequence-affichee').textContent = saisie.join(' ');
            const index = saisie.length - 1;

            if (saisie[index] !== sequence[index]) {
                bloque = true;
                tentatives--;
                document.getElementById('tentatives').textContent = tentatives;
                if (tentatives <= 0) {
                    afficherMessage("❌ Il t'a rattrapé.", '#ff4444');
                    setTimeout(() => { window.location.href = '/level3/level3_2.html'; }, 2000);
                } else {
                    afficherMessage('❌ Mauvaise séquence.', '#ff4444');
                    setTimeout(() => { cacherMessage(); afficherSequence(); bloque = false; }, 1500);
                }
                return;
            }

            if (saisie.length === sequence.length) {
                if (manche < 3) {
                    manche++;
                    document.getElementById('manche').textContent = manche;
                    afficherMessage('✅ Continue.', '#00ff88');
                    setTimeout(() => { cacherMessage(); genererSequence(); afficherSequence(); }, 1500);
                } else {
                    afficherMessage('✅ Tu as survécu.', '#00ff88');
                    setTimeout(() => { window.location.href = '/level3/level3_4.html'; }, 2000);
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (affichageEnCours || bloque) return;
            if (e.key === 'ArrowUp')    jouer('⬆️');
            if (e.key === 'ArrowDown')  jouer('⬇️');
            if (e.key === 'ArrowLeft')  jouer('⬅️');
            if (e.key === 'ArrowRight') jouer('➡️');
        });
    </script>

    <audio id="musique" loop>
        <source src="/sons/Skip_to_my_Lou.mp3" type="audio/mpeg">
    </audio>
    <script>
        const musique = document.getElementById('musique');
        musique.volume = 0;
        musique.play().catch(()=>{});
        let vol = 0;
        const fadeIn = setInterval(() => {
            vol = Math.min(0.3, vol + 0.01);
            musique.volume = vol;
            if (vol >= 0.3) clearInterval(fadeIn);
        }, 50);
    </script>
</body>
</html>
