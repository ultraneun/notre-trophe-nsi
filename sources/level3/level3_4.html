<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 3 - Aim</title>
    <link rel="stylesheet" href="/level3/style3.css">
</head>
<body class="level3_4">

    <!-- Texte d'intro -->
    <div class="container" id="intro">
        <div class="message">
            <span id="terminal-text"></span><span class="cursor">█</span>
            <div class="terminal-skip" id="terminal-skip">[ espace ]</div>
        </div>
    </div>

    <!-- Jeu (caché au début) -->
    <div id="jeu" style="display:none">
        <div id="hud">
            <span>🎯 <span id="score">0</span>/15</span>
            <span>⏱️ <span id="timer">25</span>s</span>
        </div>
        <div id="zone-jeu"></div>
    </div>

    <p id="message"></p>

    <script>
        const sfxLettre = new Audio('/sons/son_lettre.mp3');
        sfxLettre.volume = 0.3;
        const sfxTir = new Audio('/sons/tire.mp3');
        sfxTir.volume = 0.1;

        // ── Intro typewriter ────────────────────────────────────────────
        const lignes = [
            "Tu l'entends.",
            "Il se rapproche...",
            "25 secondes.",
            "Élimine les cibles.",
            "Ne rate pas.",
        ];

        const el = document.getElementById('terminal-text');
        const footer = document.getElementById('terminal-footer');
        const skip = document.getElementById('terminal-skip');
        let ligneIndex = 0, charIndex = 0, texteComplet = '';
        let typewriterFini = false, timeoutId = null;

        function finirTypewriter() {
            if (typewriterFini) return;
            typewriterFini = true;
            if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
            el.textContent = lignes.join('\n');
            skip.style.opacity = '0';
            setTimeout(afficherBouton, 800);
        }

        function afficherBouton() {
            const btn = document.createElement('button');
            btn.className = 'bouton';
            btn.textContent = 'Commencer';
            btn.style.marginTop = '1rem';
            btn.addEventListener('click', () => {
                btn.remove();
                document.body.classList.add('jeu-actif');
                document.getElementById('intro').style.display = 'none';
                demarrerJeu();
            });
            document.getElementById('intro').querySelector('.message').after(btn);
        }

        function typeChar() {
            if (typewriterFini) return;
            if (ligneIndex >= lignes.length) {
                typewriterFini = true;
                skip.style.opacity = '0';
                setTimeout(afficherBouton, 800);
                return;
            }
            const ligne = lignes[ligneIndex];
            if (charIndex < ligne.length) {
                texteComplet += ligne[charIndex];
                el.textContent = texteComplet;
                if (ligne[charIndex] !== ' ') {
                    const clone = sfxLettre.cloneNode();
                    clone.volume = 0.2;
                    clone.play().catch(() => {});
                }
                charIndex++;
                const char = ligne[charIndex - 1];
                const lastThree = ligne.slice(charIndex - 3, charIndex);
                const delay = lastThree === '...' ? 1000 : (char === '.' || char === '?') ? 500 : 50;
                timeoutId = setTimeout(typeChar, delay);
            } else {
                texteComplet += '\n'; el.textContent = texteComplet;
                ligneIndex++; charIndex = 0;
                timeoutId = setTimeout(typeChar, 500);
            }
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && !typewriterFini) {
                e.preventDefault();
                finirTypewriter();
            }
        });
        
        setTimeout(() => {
            skip.style.opacity = '1';
            typeChar();
        }, 800);

        // ── Jeu ─────────────────────────────────────────────────────────
        let score = 0;
        let temps = 25;
        let cibleActive = null;
        let jeuTermine = false;
        let timerInterval = null;

        function demarrerJeu() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('jeu').style.display = 'block';

            timerInterval = setInterval(() => {
                temps--;
                document.getElementById('timer').textContent = temps;
                if (temps <= 0) {
                    clearInterval(timerInterval);
                    echouer();
                }
            }, 1000);

            setTimeout(nouvelleCible, 500);
        }

        function nouvelleCible() {
            if (jeuTermine) return;
            if (cibleActive) cibleActive.remove();

            const cible = document.createElement('img');
            cible.src = '/images/level3/cible.png';
            const tailleAleatoire = 15 + Math.random() * 20; 
            cible.style.height = tailleAleatoire + 'vh';
            cible.style.left = (20 + Math.random() * 60) + '%';
            cible.style.top = (20 + Math.random() * 60) + '%';

            let vitesse = 300 + Math.random() * 500; 
            
            let mouvementInterval = setInterval(() => {
                if (!cible.parentNode || jeuTermine) {
                    clearInterval(mouvementInterval);
                    return;
                }
                let currentLeft = parseFloat(cible.style.left);
                let currentTop = parseFloat(cible.style.top);

                let amplitude = tailleAleatoire < 20 ? 12 : 8;

                let newLeft = Math.max(10, Math.min(90, currentLeft + (Math.random() * 16 - 8)));
                let newTop = Math.max(10, Math.min(90, currentTop + (Math.random() * 16 - 8)));
                
                cible.style.left = newLeft + '%';
                cible.style.top = newTop + '%';
            }, vitesse);

            document.getElementById('zone-jeu').appendChild(cible);
            cibleActive = cible;

            setTimeout(() => {
                cible.style.left = Math.max(10, Math.min(90, parseFloat(cible.style.left) + (Math.random() * 16 - 8))) + '%';
                cible.style.top = Math.max(10, Math.min(90, parseFloat(cible.style.top) + (Math.random() * 16 - 8))) + '%';
            }, 50);

        function faireEffetTir() {
            const flash = document.createElement('div');
            flash.classList.add('flash-tir');
            document.body.appendChild(flash);

            const jeu = document.getElementById('jeu');
            jeu.classList.remove('recul-ecran');
            void jeu.offsetWidth; 
            jeu.classList.add('recul-ecran');

            setTimeout(() => flash.remove(), 150);
        }

        cible.addEventListener('click', () => {
            if (jeuTermine) return;

            const sonFlingue = sfxTir.cloneNode();
            sonFlingue.play();
            
            const flash = document.createElement('div');
            flash.classList.add('flash-tir');
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 100);

            document.body.classList.remove('recul-fond');
            void document.body.offsetWidth; 
            document.body.classList.add('recul-fond');

            score++;
            document.getElementById('score').textContent = score;

            clearInterval(mouvementInterval);
            cible.remove();
            cibleActive = null;

            if (score >= 15) {
                jeuTermine = true;
                clearInterval(timerInterval);
                gagner();
            } else {
                setTimeout(nouvelleCible, 100);
            }
        });

            document.getElementById('zone-jeu').appendChild(cible);
            cibleActive = cible;
        }

        function gagner() {
            document.getElementById('message').textContent = "✅ Tu as survécu.";
            document.getElementById('message').style.color = "#00ff88";
            setTimeout(() => {
                window.location.href = '/level3/level3_5.html';
            }, 2000);
        }

        function echouer() {
            jeuTermine = true;
            if (cibleActive) cibleActive.remove();
            document.getElementById('message').textContent = "❌ Trop lent. Il t'a eu.";
            document.getElementById('message').style.color = "#ff4444";
            setTimeout(() => {
                window.location.href = '/level3/level3_2.html';
            }, 2000);
        }
    </script>
    <audio id="musique" loop>
        <source src="/sons/Level_Fun.mp3" type="audio/mpeg">
    </audio>

    <script>
    const musique = document.getElementById('musique');

    musique.volume = 0;
    musique.play().catch(()=>{});

    let vol = 0;
    const fadeIn = setInterval(() => {
        vol = Math.min(0.3, vol + 0.01);
        musique.volume = vol;
        if (vol >= 0.3) clearInterval(fadeIn);
    }, 50);
    </script>

</body>
</html>
