<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 3 - Sortie</title>
    <link rel="stylesheet" href="/level3/style3.css">
</head>
<body class="level3_5">

    <div class="container">
        <h1 class="bug">SORTIE</h1>

        <div class="message">
            <span id="terminal-text"></span><span class="cursor">█</span>
            <div class="terminal-skip" id="terminal-skip">[ espace ]</div>
        </div>
        <div id="code-footer">
            <input type="text" id="code-input" placeholder="_ _ _ _" maxlength="4">
            <button class="bouton" onclick="verifierCode()">ENTRER</button>
            <button class="bouton" onclick="window.location.href='/level3'">
                RECOMMENCER DEPUIS LE DÉBUT
            </button>
            <p id="message-code"></p>
        </div>

    <script>
        const sfxLettre = new Audio('/sons/son_lettre.mp3');
        sfxLettre.volume = 0.3;

        const lignes = [
            "Une porte.",
            "Elle est verrouillée...",
            "Un clavier à 4 chiffres.",
            "Le premier : le nombre de paires du memory.",
            "Le second : le nombre de flèches de la séquence.",
            "Le troisième : le nombre de cibles éliminées...",
            "Tu t'en souviens ?",
        ];

        const el = document.getElementById('terminal-text');
        const footer = document.getElementById('code-footer');
        const skip = document.getElementById('terminal-skip');
        let ligneIndex = 0, charIndex = 0, texteComplet = '';
        let typewriterFini = false, timeoutId = null;

        function finirTypewriter() {
            if (typewriterFini) return;
            typewriterFini = true;
            if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
            el.textContent = lignes.join('\n');
            skip.style.opacity = '0';
            setTimeout(() => footer.classList.add('visible'), 600);
        }

        function typeChar() {
            if (typewriterFini) return;
            if (ligneIndex >= lignes.length) {
                typewriterFini = true;
                skip.style.opacity = '0';
                setTimeout(() => footer.classList.add('visible'), 600);
                return;
            }
            const ligne = lignes[ligneIndex];
            if (charIndex < ligne.length) {
                texteComplet += ligne[charIndex];
                el.textContent = texteComplet;
                if (ligne[charIndex] !== ' ') {
                    const clone = sfxLettre.cloneNode();
                    clone.volume = 0.2;
                    clone.play().catch(() => {});
                }
                charIndex++;
                const char = ligne[charIndex - 1];
                const lastThree = ligne.slice(charIndex - 3, charIndex);
                const delay = lastThree === '...' ? 1000 : (char === '.' || char === '?') ? 500 : 50;
                timeoutId = setTimeout(typeChar, delay);
            } else {
                texteComplet += '\n'; el.textContent = texteComplet;
                ligneIndex++; charIndex = 0;
                timeoutId = setTimeout(typeChar, 500);
            }
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && !typewriterFini) {
                e.preventDefault();
                finirTypewriter();
            }
        });
        
        setTimeout(() => {
            skip.style.opacity = '1';
            typeChar();
        }, 800);

        async function verifierCode() {
            const code = document.getElementById('code-input').value.trim();
            const reponse = await fetch('/verifier/5', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({flag: code})
            });
            const data = await reponse.json();

            if (data.succes) {
                // Cacher le formulaire
                footer.style.opacity = '0';
                footer.style.pointerEvents = 'none';

                // Nouveau texte qui s'écrit
                const lignesFin = [
                    "...",
                    "La porte s'ouvre...",
                    "De l'autre côté.",
                    "Un couloir.",
                    "Encore...",
                    "Tu croyais rentrer chez toi ?..",
                    "Les Backrooms ne te libèrent jamais.",
                    "Continue.",
                ];

                texteComplet += '\n\n';
                ligneIndex = 0;
                charIndex = 0;

                function typeFinale() {
                    if (ligneIndex >= lignesFin.length) {
                        setTimeout(() => {
                            window.location.href = data.redirect;
                        }, 1500);
                        return;
                    }
                    const ligne = lignesFin[ligneIndex];
                    if (charIndex < ligne.length) {
                        texteComplet += ligne[charIndex];
                        el.textContent = texteComplet;
                        if (ligne[charIndex] !== ' ') {
                            const clone = sfxLettre.cloneNode();
                            clone.volume = 0.2;
                            clone.play().catch(() => {});
                        }
                        charIndex++;
                        const char = ligne[charIndex - 1];
                        const lastThree = ligne.slice(charIndex - 3, charIndex);
                        const delay =
                            lastThree === '...' ? 1000 :
                            (char === '.' || char === '?') ? 1000 : 90;
                        setTimeout(typeFinale, delay);
                    } else {
                        texteComplet += '\n'; el.textContent = texteComplet;
                        ligneIndex++; charIndex = 0;
                        setTimeout(typeFinale, 500);
                    }
                }

                typeFinale();

            } else {
                document.getElementById('message-code').textContent = "❌ Mauvais code. Tu te souviens vraiment ?";
                document.getElementById('message-code').style.color = "#ff4444";
            }
        }
    </script>
    <audio id="musique" loop>
        <source src="/sons/Daisy.mp3"" type="audio/mpeg">
    </audio>

    <script>
    const musique = document.getElementById('musique');

    musique.currentTime = 36.9;
    musique.volume = 0;
    musique.play().catch(()=>{});

    let vol = 0;
    const fadeIn = setInterval(() => {
        vol = Math.min(0.1, vol + 0.01);
        musique.volume = vol;
        if (vol >= 0.1) clearInterval(fadeIn);
    }, 50);
    </script>

</body>
</html>
