<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 1 - The Backrooms</title>
    <link rel="stylesheet" href="/level1/style1.css">
    <style>
        .code-hint {
            background: #0a1520;
            border: 1px solid #1a3a48;
            padding: 0.5rem 1rem;
            text-align: center;
            min-width: 80px;
        }
        .code-hint-label {
            font-size: 0.55rem; letter-spacing: 0.2rem;
            color: #1a4a5a; text-transform: uppercase; margin-bottom: 0.3rem;
        }
        .code-hint-val {
            font-family: 'Courier New', monospace;
            font-size: 1rem; font-weight: bold; color: #4a8a9a;
            letter-spacing: 0.15rem;
        }
        .code-hint-val.found { color: #00b4d8; }
        .code-hint-sep {
            color: #0a2030; font-size: 1.2rem;
            display: flex; align-items: center;
        }
    </style>
</head>
<body>

    <div id="eye-open"></div>
    <div id="eye-top"></div>
    <div id="eye-bottom"></div>
    <div id="transition-out"></div>

    <div class="container" id="vue-terminal">
        <div class="terminal">
            <div class="terminal-header">NIVEAU_01 // PARKING</div>
            <div class="terminal-body">
                <span id="terminal-text"></span><span class="cursor" id="cursor">█</span>
            </div>
            <div class="terminal-skip" id="terminal-skip">[ espace ]</div>
            <div class="terminal-footer" id="terminal-footer">
                <button class="bouton-toggle" id="btn-explorer">
                    <span class="toggle-icon">⊞</span> Explorer la pièce
                </button>
            </div>
        </div>
    </div>

    <div id="vue-image">
        <button class="bouton-retour" id="btn-retour">⊟ Rapport</button>
        <div id="img-wrapper">
            <img id="img-level1" src="/images/level1.png" alt="">
            <div id="zone-secrete"  class="zone" data-dest="/level1.1" data-verrou="true"></div>
            <div id="zone-secrete2" class="zone" data-dest="/level1.2"></div>
            <div id="zone-secrete3" class="zone" data-dest="/level1.3"></div>
        </div>
        <div id="hud-progression">
            <span class="hud-item" id="hud-12">⬡</span>
            <span class="hud-item" id="hud-13">⬡</span>
            <span class="hud-sep">→</span>
            <span class="hud-item" id="hud-porte">🔒</span>
        </div>
    </div>

    <div id="popup-verrou">
        <div id="popup-contenu">
            <p id="popup-titre">ACCÈS RESTREINT</p>
            <p id="popup-texte"></p>
            <button class="bouton" onclick="fermerPopup()">Compris</button>
        </div>
    </div>

    <div id="popup-coords">
        <div id="popup-coords-contenu">
            <p class="popup-label">ACCÈS NIVEAU SUIVANT</p>
            <p class="popup-sub">Entrez les coordonnées</p>

            <!-- Indices codes trouvés -->
            <div id="coords-indices" style="display:flex;gap:12px;justify-content:center;margin-bottom:1.4rem;">
                <div class="code-hint" id="hint-12">
                    <div class="code-hint-label">1.2</div>
                    <div class="code-hint-val" id="hint-12-val">—</div>
                </div>
                <div class="code-hint-sep">·</div>
                <div class="code-hint" id="hint-13">
                    <div class="code-hint-label">1.3</div>
                    <div class="code-hint-val" id="hint-13-val">—</div>
                </div>
            </div>
            <div class="coord-ligne">
                <div class="coord-display" id="lat-display" onclick="document.getElementById('lat-raw').focus()">__°__'__._"N</div>
                <input type="tel" id="lat-raw" class="coord-hidden-input" maxlength="7" placeholder="">
            </div>
            <div class="coord-ligne" style="margin-top:10px;">
                <div class="coord-display" id="lon-display" onclick="document.getElementById('lon-raw').focus()">_°__'__._"W</div>
                <input type="tel" id="lon-raw" class="coord-hidden-input" maxlength="6" placeholder="">
            </div>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:1.4rem;">
                <button class="bouton" id="btn-coords-retour">← Retour</button>
                <button class="bouton" id="btn-coords-valider">Valider</button>
            </div>
            <p id="coords-message"></p>
        </div>
    </div>

    <script>
        const sfxLettre = new Audio('/sons/son_lettre.mp3');
        sfxLettre.volume = 0.3;

        const lignes = [
            "Un parking souterrain?",
            "Les tuyaux au plafond fuient. Évitez l'eau.",
            "Vous pouvez peut-être trouver de la nourriture.",
            "Peut-être même une issue.",
            "À vous d'observer le parking...",
        ];

        const el     = document.getElementById('terminal-text');
        const footer = document.getElementById('terminal-footer');
        const skip   = document.getElementById('terminal-skip');
        const cursor = document.getElementById('cursor');

        let ligneIndex    = 0;
        let charIndex     = 0;
        let typewriterFini = false;
        let timeoutId     = null;
        let peutSkipper   = false; // bloqué pendant la transition des yeux

        function finirTypewriter() {
            if (typewriterFini) return;
            typewriterFini = true;
            // Annule tout setTimeout en cours
            if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
            // Affiche le texte final proprement
            el.textContent = lignes.join('\n');
            cursor.style.display = 'none';
            skip.style.display = 'none';
            footer.classList.add('visible');
        }

        function typeChar() {
            // Si skip a été déclenché entre temps, on arrête
            if (typewriterFini) return;

            if (ligneIndex >= lignes.length) {
                finirTypewriter();
                return;
            }

            const ligne = lignes[ligneIndex];

            if (charIndex < ligne.length) {
                el.textContent += ligne[charIndex];

                if (ligne[charIndex] !== ' ') {
                    const clone = sfxLettre.cloneNode();
                    clone.volume = 0.2;
                    clone.play().catch(() => {});
                }

                charIndex++;
                const char      = ligne[charIndex - 1];
                const lastThree = ligne.slice(charIndex - 3, charIndex);
                const delay     = lastThree === '...' ? 1000 :
                                  (char === '.' || char === '?') ? 500 : 50;
                timeoutId = setTimeout(typeChar, delay);
            } else {
                el.textContent += '\n';
                ligneIndex++;
                charIndex = 0;
                timeoutId = setTimeout(typeChar, 500);
            }
        }

        // Skip : espace ou clic sur le terminal
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && !typewriterFini && peutSkipper) {
                e.preventDefault();
                finirTypewriter();
            }
        });

        // Démarre après la transition des yeux (3400ms)
        setTimeout(() => {
            peutSkipper = true;
            skip.style.opacity = '1';
            typeChar();
        }, 3400);

        // ── Ratio image ───────────────────────────────────────────
        const img = document.getElementById('img-level1');
        const wrapper = document.getElementById('img-wrapper');
        function redimensionner() {
            const ri = img.naturalWidth / img.naturalHeight;
            const rf = window.innerWidth / window.innerHeight;
            let w, h;
            if (rf > ri) { h = window.innerHeight; w = h * ri; }
            else         { w = window.innerWidth;  h = w / ri; }
            wrapper.style.width  = w + 'px';
            wrapper.style.height = h + 'px';
        }
        img.addEventListener('load', redimensionner);
        window.addEventListener('resize', redimensionner);
        if (img.complete && img.naturalWidth) redimensionner();

        // ── Toggle vues ───────────────────────────────────────────
        const vueTerminal = document.getElementById('vue-terminal');
        const vueImage    = document.getElementById('vue-image');
        document.getElementById('btn-explorer').addEventListener('click', () => {
            vueTerminal.classList.add('hidden'); vueImage.classList.add('active'); majHUD();
        });
        document.getElementById('btn-retour').addEventListener('click', () => {
            vueImage.classList.remove('active'); vueTerminal.classList.remove('hidden');
        });

        // ── HUD ───────────────────────────────────────────────────
        function estDebloque(id) { return sessionStorage.getItem('lvl1_' + id) === '1'; }
        function majHUD() {
            const ok12 = estDebloque('1.2'), ok13 = estDebloque('1.3');
            const h12  = document.getElementById('hud-12'), h13 = document.getElementById('hud-13');
            h12.textContent = ok12 ? '⬢' : '⬡'; h12.style.color = ok12 ? '#00b4d8' : '#2a3a40';
            h13.textContent = ok13 ? '⬢' : '⬡'; h13.style.color = ok13 ? '#00b4d8' : '#2a3a40';
            document.getElementById('hud-porte').textContent = (ok12 && ok13) ? '🔓' : '🔒';
        }

        // ── Zones ─────────────────────────────────────────────────
        const overlay = document.getElementById('transition-out');
        document.querySelectorAll('.zone').forEach(zone => {
            zone.addEventListener('click', function () {
                const dest   = this.dataset.dest;
                const verrou = this.dataset.verrou === 'true';
                if (verrou) {
                    estDebloque('1.2') && estDebloque('1.3') ? ouvrirPopupCoords() : ouvrirPopupVerrou();
                    return;
                }
                const rect = this.getBoundingClientRect();
                const ox = ((rect.left + rect.width  / 2) / window.innerWidth  * 100).toFixed(1) + '%';
                const oy = ((rect.top  + rect.height / 2) / window.innerHeight * 100).toFixed(1) + '%';
                document.body.style.transformOrigin = `${ox} ${oy}`;
                document.body.classList.add('zoom-out');
                setTimeout(() => overlay.classList.add('active'), 300);
                setTimeout(() => { window.location.href = dest; }, 1100);
            });
        });

        // ── Popup verrou ──────────────────────────────────────────
        function ouvrirPopupVerrou() {
            const ok12 = estDebloque('1.2'), ok13 = estDebloque('1.3');
            let msg = 'Cette porte est verrouillée.';
            if (!ok12 && !ok13) msg += '<br>Il vous manque deux informations.';
            else msg += '<br>Il vous manque encore quelque chose.';
            document.getElementById('popup-texte').innerHTML = msg;
            document.getElementById('popup-verrou').classList.add('active');
        }
        function fermerPopup() { document.getElementById('popup-verrou').classList.remove('active'); }

        // ── Popup coords ──────────────────────────────────────────
        function ouvrirPopupCoords() {
            document.getElementById('popup-coords').classList.add('active');
            resetCoordsInput();
            // Affiche les codes trouvés
            const v12 = sessionStorage.getItem('code_1.2');
            const v13 = sessionStorage.getItem('code_1.3');
            const h12 = document.getElementById('hint-12-val');
            const h13 = document.getElementById('hint-13-val');
            if (v12) { h12.textContent = v12; h12.classList.add('found'); }
            else     { h12.textContent = '—'; h12.classList.remove('found'); }
            if (v13) { h13.textContent = v13; h13.classList.add('found'); }
            else     { h13.textContent = '—'; h13.classList.remove('found'); }
            document.getElementById('lat-raw').focus();
        }
        function fermerPopupCoords() {
            document.getElementById('popup-coords').classList.remove('active');
        }

        document.getElementById('btn-coords-retour').addEventListener('click', fermerPopupCoords);
        document.getElementById('btn-coords-valider').addEventListener('click', validerCoords);

        function formaterLat(c) { const s = c.padEnd(7,'_'); return `${s[0]}${s[1]}°${s[2]}${s[3]}'${s[4]}${s[5]}.${s[6]}"N`; }
        function formaterLon(c) { const s = c.padEnd(6,'_'); return `${s[0]}°${s[1]}${s[2]}'${s[3]}${s[4]}.${s[5]}"W`; }

        function resetCoordsInput() {
            document.getElementById('lat-raw').value = '';
            document.getElementById('lon-raw').value = '';
            document.getElementById('lat-display').textContent = formaterLat('');
            document.getElementById('lon-display').textContent = formaterLon('');
            document.getElementById('coords-message').textContent = '';
        }

        document.getElementById('lat-raw').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 7);
            document.getElementById('lat-display').textContent = formaterLat(this.value);
            if (this.value.length === 7) document.getElementById('lon-raw').focus();
        });
        document.getElementById('lon-raw').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            document.getElementById('lon-display').textContent = formaterLon(this.value);
        });
        document.getElementById('lon-raw').addEventListener('keydown', function (e) {
            if (e.key === 'Backspace' && this.value === '') document.getElementById('lat-raw').focus();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.getElementById('popup-coords').classList.contains('active')) validerCoords();
        });

        function validerCoords() {
            const lat = document.getElementById('lat-raw').value;
            const lon = document.getElementById('lon-raw').value;
            const msg = document.getElementById('coords-message');
            if (lat === '5130003' && lon === '007365') {
                msg.style.color = '#00ff88'; msg.textContent = 'Accès accordé.';
                setTimeout(() => {
                    fermerPopupCoords();
                    document.body.classList.add('zoom-out');
                    overlay.classList.add('active');
                    setTimeout(() => { window.location.href = '/level1.1'; }, 800);
                }, 900);
            } else {
                msg.style.color = '#ff6b6b'; msg.textContent = 'Coordonnées incorrectes.';
                setTimeout(() => { resetCoordsInput(); document.getElementById('lat-raw').focus(); }, 800);
            }
        }

        // Retour avec ?done=
        const params = new URLSearchParams(window.location.search);
        const done   = params.get('done');
        if (done) { sessionStorage.setItem('lvl1_' + done, '1'); history.replaceState({}, '', '/level1'); }
        majHUD();
    </script>
<audio id="amb" loop src="/sons/AmbianceLevel1.mp3"></audio>
<script>
    const amb = document.getElementById('amb');
    amb.volume = 0;
    amb.play().catch(()=>{});
    document.addEventListener('click', () => amb.play().catch(()=>{}), { once: true });
    let vol = 0;
    const fadeIn = setInterval(() => {
        vol = Math.min(0.1, vol + 0.001);
        amb.volume = vol;
        if (vol >= 0.1) clearInterval(fadeIn);
    }, 25);
</script>
</body>
</html>
