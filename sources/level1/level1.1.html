<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 1.1 - The Backrooms</title>
    <link rel="stylesheet" href="/level1/style1.css">
    <style>
        body { animation: fade-in-page 0.8s ease forwards; background-image: url('/images/level1.1.jpg'); }

        .heure-display {
            font-family: 'Courier New', monospace;
            font-size: 2.8rem;
            color: #a0a0a0;
            letter-spacing: 0.4rem;
            margin-bottom: 1rem;
            background: #0f1a20;
            border: 3px solid #2a3a40;
            padding: 0.6rem 2rem;
            display: inline-block;
        }
        #heure-raw {
            position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0;
        }
        .heure-wrap { cursor: text; }
        .heure-wrap:focus-within .heure-display { border-color: #00b4d8; }

        .coords-recap-bloc {
            background: rgba(4,8,12,0.85);
            border: 1px solid #1a3a48;
            padding: 0.8rem 1.4rem;
            margin-bottom: 1.8rem;
            max-width: 500px;
            text-align: center;
        }
        .coords-recap-label {
            font-size: 0.55rem; letter-spacing: 0.2rem;
            color: #1a4a5a; text-transform: uppercase; margin-bottom: 0.5rem;
        }
        .coords-recap-val {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem; color: #3a7a8a;
            letter-spacing: 0.1rem; line-height: 1.8;
        }
        .coords-recap-val.found { color: #00b4d8; }
    </style>
</head>
<body>
    <a class="retour-lien" href="/level1">⊟ Retour</a>

    <div class="container">

        <div class="message" style="max-width:500px; margin-bottom:2rem;">
            <p>Vous devez rejoindre les coordonnées</p>
            <p>Il semble que vous soyez en <span class="alert">Juillet 2024.</span></p>
            <p><em>Mais quelle heure est-t-il ?</em></p>
            <p class="hint">Google Maps peut s'avérer utile pour cette situation.</p>

        </div>

        <div class="coords-recap-bloc" id="coords-recap">
            <div class="coords-recap-label">coordonnées</div>
            <div class="coords-recap-val" id="recap-lat">latitude —</div>
            <div class="coords-recap-val" id="recap-lon">longitude —</div>
        </div>

        <div class="heure-wrap" onclick="document.getElementById('heure-raw').focus()">
            <div class="heure-display" id="heure-display">__:__</div>
            <input type="tel" id="heure-raw" maxlength="4">
        </div>
        <br><br>
        <button class="bouton" id="valider">Valider</button>
        <p id="message" style="color:#00b4d8; margin-top:1rem;"></p>
    </div>

    <script>
        const raw     = document.getElementById('heure-raw');
        const display = document.getElementById('heure-display');
        const bouton  = document.getElementById('valider');
        const message = document.getElementById('message');

        function formaterHeure(chiffres){
            const c = chiffres.padEnd(4,'_');
            return `${c[0]}${c[1]}:${c[2]}${c[3]}`;
        }

        raw.addEventListener('input', function(){
            this.value = this.value.replace(/\D/g,'').slice(0,4);
            display.textContent = formaterHeure(this.value);
        });

        bouton.addEventListener('click', verifier);
        raw.addEventListener('keypress', e => { if(e.key==='Enter') verifier(); });

        // Focus auto au chargement
        setTimeout(()=>raw.focus(), 600);

        // Affiche les coordonnées depuis sessionStorage
        (function() {
            const v12 = sessionStorage.getItem('code_1.2'); // latitude : 5130003
            const v13 = sessionStorage.getItem('code_1.3'); // longitude : 003765x

            const rLat = document.getElementById('recap-lat');
            const rLon = document.getElementById('recap-lon');

            if (v12) {
                // Formate 5130003 → 51°30'00.3"N
                const s = v12.padStart(7,'0');
                rLat.textContent = s[0]+s[1]+'°'+s[2]+s[3]+"'"+s[4]+s[5]+'.'+s[6]+'"N';
                rLat.classList.add('found');
            } else {
                rLat.textContent = 'latitude — non trouvée';
            }

            if (v13) {
                // Formate 003765 → 0°07'36.5"W  (6 chiffres)
                const raw13 = v13.replace(/\D/g,'').slice(0,6).padStart(6,'0');
                rLon.textContent = raw13[0]+'°'+raw13[1]+raw13[2]+"'"+raw13[3]+raw13[4]+'.'+raw13[5]+'"W';
                rLon.classList.add('found');
            } else {
                rLon.textContent = 'longitude — non trouvée';
            }
        })();

        async function verifier(){
            const val = raw.value.trim();
            if(val.length < 4){
                message.style.color='#ff6b6b';
                message.textContent='Entrez une heure complète.';
                return;
            }
            // Reconstruit HH:MM pour le serveur
            const flagFormate = val.slice(0,2)+':'+val.slice(2,4);
            const rep  = await fetch('/verifier/2',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({flag:flagFormate})
            });
            const data = await rep.json();
            if(data.succes){
                message.style.color='#00ff88';
                message.textContent='Le bourdonnement change de tonalité. Une porte s\'ouvre.';
                bouton.disabled=true;
                setTimeout(()=>{ window.location.href=data.redirect; },2500);
            } else {
                message.style.color='#ff6b6b';
                message.textContent='Cette heure ne correspond à rien ici.';
                raw.value='';
                display.textContent=formaterHeure('');
                document.body.style.animation='shake 0.4s';
                setTimeout(()=>{ document.body.style.animation=''; raw.focus(); },400);
            }
        }
    </script>
<audio id="amb" loop src="/sons/AmbianceLevel1.mp3"></audio>
<script>
    const amb = document.getElementById('amb');
    amb.volume = 0;
    amb.play().catch(()=>{});
    document.addEventListener('click', () => amb.play().catch(()=>{}), { once: true });
    let vol = 0;
    const fadeIn = setInterval(() => {
        vol = Math.min(0.1, vol + 0.01);
        amb.volume = vol;
        if (vol >= 0.1) clearInterval(fadeIn);
    }, 25);
</script>
</body>
</html>
